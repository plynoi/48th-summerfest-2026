    const oshiMembers = ["Emmy","Hoop","Jew","Khowjow","Lingling","Luksorn","Pancake","Yoghurt"];


    // กำหนดราคากิจกรรมแยกออกมา เพื่อให้แก้ไขและอัปเดตได้ง่าย
    const activityPrices = {
        "ไม่พร้อมค่ะ": "🎟️ 1 Ticket",
        "ดูแปลกๆนะคะ": "🎟️ 1 Ticket",
        "The Shoot Sisters": "🎟️ 1 Ticket",
        "โดนนนนตก!": "🎟️ 2 Tickets",
        "Shot Me Girls": "🎟️ 5 Tickets",
        "ฮับขวัญฮื้อ(ด้าย)ไหม่เจ้า?": "🏷️ 200.-/Set",
        "Hachi Cha": "-",
        "Merchandise": "-"
    };

    function getActivityColorClass(act) {
        if (act === "ไม่พร้อมค่ะ") return "act-mai";
        if (act === "ดูแปลกๆนะคะ") return "act-du";
        if (act === "The Shoot Sisters") return "act-sisters";
        if (act === "โดนนนนตก!") return "act-don";
        if (act === "Shot Me Girls") return "act-shot";
        if (act === "ฮับขวัญฮื้อ(ด้าย)ไหม่เจ้า?") return "act-hub";
        if (act === "Hachi Cha") return "act-hachi";
        if (act === "Merchandise") return "act-merch";
        return "";
    }

    function populateFilters() {
        const memberFilter = document.getElementById('memberFilter');
        const activityFilter = document.getElementById('activityFilter');
        const showOnlyOshi = document.getElementById('oshiCheck')?.checked;

        // จดจำค่าที่ถูกเลือกไว้ก่อนเคลียร์ข้อมูลใหม่
        const currentMember = memberFilter.value;
        const currentActivity = activityFilter.value;

        memberFilter.innerHTML = '<option value="all">👩‍🎤 เมมเบอร์ทุกคน</option>';
        activityFilter.innerHTML = '<option value="all">🎪 ทุกกิจกรรม</option>';

        const members = new Set();
        const activities = new Map();

        scheduleData.forEach(item => {
            members.add(item.member);
            if (!activities.has(item.activity)) {
                let price = activityPrices[item.activity] || '';
                let priceText = '';
                if (price.includes('Ticket')) {
                    priceText = ` (${price.replace('🎟️ ', '')})`;
                } else if (price.includes('.-')) {
                    priceText = ` (${price.replace('🏷️ ', '').replace('/Set', '')})`;
                }
                activities.set(item.activity, `${item.activity}${priceText}`);
            }
        });

        let sortedMembers = [...members].sort((a, b) => a.localeCompare(b, 'en'));
        
        // กรองเฉพาะเมมเบอร์โอชิ หาก Checkbox ถูกเลือก
        if (showOnlyOshi) {
            sortedMembers = sortedMembers.filter(m => oshiMembers.includes(m));
        }

        sortedMembers.forEach(member => {
            const option = document.createElement('option');
            option.value = member;
            option.textContent = member;
            memberFilter.appendChild(option);
        });

        const sortedActivities = [...activities.entries()].sort((a, b) => a[0].localeCompare(b[0], 'th'));
        sortedActivities.forEach(([value, text]) => {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = text;
            activityFilter.appendChild(option);
        });

        // คืนค่าที่เลือกไว้ หรือสลับเป็น "all" หากเมมเบอร์ที่เลือกก่อนหน้าไม่อยู่ในเงื่อนไขปัจจุบัน
        if (sortedMembers.includes(currentMember)) {
            memberFilter.value = currentMember;
        } else {
            memberFilter.value = "all";
        }
        
        activityFilter.value = currentActivity || "all";
        
        renderTable();
    }

    function renderTable() {
        const dayFilter = document.getElementById("dayFilter").value;
        const memberFilter = document.getElementById("memberFilter").value;
        const actFilter = document.getElementById("activityFilter").value;
        const tbody = document.getElementById("scheduleBody");
        
        tbody.innerHTML = "";

        const filteredData = scheduleData.filter(item => {
            const matchDay = dayFilter === "all" || item.day === dayFilter;
            const matchMember = memberFilter === "all" || item.member === memberFilter;
            const matchAct = actFilter === "all" || item.activity === actFilter;
            return matchDay && matchMember && matchAct;
        });

        filteredData.forEach(item => {
            const row = document.createElement("tr");
            const colorClass = getActivityColorClass(item.activity);
            const price = activityPrices[item.activity] || "-";
            
            row.innerHTML = `
                <td>${item.day}</td>
                <td><strong>${item.time}</strong></td>
                <td><span class="member-badge">${item.member}</span></td>
                <td><span class="activity-badge ${colorClass}">${item.activity}</span></td>
                <td class="price-text">${price}</td>
            `;
            tbody.appendChild(row);
        });

        if (filteredData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#888; padding: 20px;">ไม่พบตารางกิจกรรม</td></tr>`;
        }
    }

    populateFilters();
