    // ฟังก์ชันสำหรับเลือกคลาส CSS ของสีกิจกรรม
    function getActivityColorClass(activityName) {
        if (activityName === "Shot Me Girls") return "act-shot";
        if (activityName === "โดนนนนตก!") return "act-don";
        if (activityName === "(ไม่) พร้อม ka") return "act-mai";
        if (activityName === "Hachi Cha") return "act-hachi";
        if (activityName === "ดูแปลกนะคะ") return "act-du";
        if (activityName === "The Shoot Sisters") return "act-sisters";
        return "";
    }

    function renderTable() {
        const dayFilter = document.getElementById("dayFilter").value;
        const memberFilter = document.getElementById("memberFilter").value;
        const activityFilter = document.getElementById("activityFilter").value;
        const tbody = document.getElementById("scheduleBody");
        
        tbody.innerHTML = "";

        const filteredData = scheduleData.filter(item => {
            const matchDay = dayFilter === "all" || item.day === dayFilter;
            const matchMember = memberFilter === "all" || item.member === memberFilter;
            const matchActivity = activityFilter === "all" || item.activity === activityFilter;
            return matchDay && matchMember && matchActivity;
        });

        filteredData.forEach(item => {
            const row = document.createElement("tr");
            const colorClass = getActivityColorClass(item.activity); // ดึงคลาสสีมาใช้
            
            row.innerHTML = `
                <td>${item.day}</td>
                <td><strong>${item.time}</strong></td>
                <td><span class="member-badge">${item.member}</span></td>
                <td><span class="activity-badge ${colorClass}">${item.activity}</span></td>
            `;
            tbody.appendChild(row);
        });

        if (filteredData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#888; padding: 20px;">ไม่พบตารางกิจกรรมในช่วงเวลานี้</td></tr>`;
        }
    }

    function populateActivityFilter() {
        const activityFilterSelect = document.getElementById('activityFilter');
        const activities = [...new Set(scheduleData.map(item => item.activity))];
        activities.sort();
        activities.forEach(activity => {
            const option = document.createElement('option');
            option.value = activity;
            option.textContent = activity;
            activityFilterSelect.appendChild(option);
        });
    }

    populateActivityFilter();
    renderTable();
