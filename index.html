<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNK48 & CGM48 Siam-Nippon Summer Fest 2026 - Schedule</title>
    <link rel="stylesheet" href="styles.css">
    <script src="./src/siam-nipponfest2026.js" defer></script>
</head>
<body>

<div class="container">
    <h1>BNK48 & CGM48 Siam-Nippon Summer Fest 2026 - Schedule (v2)</h1>
    
    <div class="filters">
        <label style="display: flex; align-items: center; gap: 8px; padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; background-color: #fafafa; cursor: pointer;">
            <input type="checkbox" id="oshiCheck">
            💖 เฉพาะโอชิของ <a href="https://plynoi.com/" target="_blank">plynoi</a>
        </label>
        <select id="dayFilter"">
            <option value="all">🗓️ ทุกวัน</option>
            <option value="ศุกร์ 27 มี.ค.">ศุกร์ 27 มี.ค.</option>
            <option value="เสาร์ 28 มี.ค.">เสาร์ 28 มี.ค.</option>
            <option value="อาทิตย์ 29 มี.ค.">อาทิตย์ 29 มี.ค.</option>
        </select>
        
        <select id="memberFilter">
            <option value="all">👩‍🎤 เมมเบอร์ทุกคน</option>
        </select>
        
        <select id="activityFilter">
            <option value="all">🎪 ทุกกิจกรรม</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>วันที่</th>
                <th>เวลา</th>
                <th>เมมเบอร์</th>
                <th>กิจกรรม</th>
                <th>ราคา/บัตร</th>
            </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
    </table>
</div>

</body>
</html>
